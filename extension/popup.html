<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>paste-to-docs</title>
  <script>
    performance.mark('html-start');
    document.addEventListener('DOMContentLoaded', function() {
      performance.mark('dom-content-loaded');
    });
    window.addEventListener('load', function() {
      performance.mark('page-loaded');
      var nav = performance.getEntriesByType('navigation')[0];
      if (nav) {
        console.log('[perf] DOMContentLoaded: ' + nav.domContentLoadedEventEnd.toFixed(1) + 'ms');
        console.log('[perf] Load event:       ' + nav.loadEventEnd.toFixed(1) + 'ms');
      }
    });
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #111318;
      --surface:   #1c1e27;
      --border:    rgba(255, 255, 255, 0.07);
      --text:      #e8eaf0;
      --muted:     #6b7090;
      --accent:    #6366f1;
      --green:     #22d3a3;
      --red:       #f87171;
      --radius:    10px;
    }

    body {
      width: 296px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      line-height: 1.4;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 13px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      width: 28px;
      height: 28px;
      background: var(--accent);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }

    .title {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -.01em;
    }

    .status {
      margin-left: auto;
      font-size: 11px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: color .2s;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      transition: background .2s;
    }

    /* ── Toggle row ─────────────────────────────────────── */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }

    .toggle-label {
      font-weight: 500;
    }

    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .slider {
      position: absolute;
      inset: 0;
      background: #2c2f3e;
      border-radius: 11px;
      cursor: pointer;
      transition: background .2s;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform .2s;
      box-shadow: 0 1px 3px rgba(0,0,0,.3);
    }

    .toggle input:checked + .slider {
      background: var(--accent);
    }

    .toggle input:checked + .slider::before {
      transform: translateX(18px);
    }

    /* ── Sources ─────────────────────────────────────────── */
    .section {
      padding: 10px 16px 12px;
      border-bottom: 1px solid var(--border);
    }

    .section-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .09em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .sources {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .source-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 11.5px;
      color: #b0b4cc;
    }

    .source-chip .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }

    /* ── Stats ───────────────────────────────────────────── */
    .stats {
      display: flex;
      padding: 12px 16px;
      gap: 0;
      border-bottom: 1px solid var(--border);
    }

    .stat {
      flex: 1;
    }

    .stat + .stat {
      padding-left: 16px;
      border-left: 1px solid var(--border);
    }

    .stat-value {
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -.02em;
      line-height: 1;
      margin-bottom: 3px;
    }

    .stat-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    /* ── Footer ──────────────────────────────────────────── */
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 16px;
    }

    .version {
      font-size: 10px;
      color: var(--muted);
    }

    .gh-link {
      font-size: 11px;
      color: var(--muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color .15s;
    }

    .gh-link:hover { color: var(--text); }

    /* ── Counter animation ───────────────────────────────── */
    @keyframes countUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .stat-value.animated {
      animation: countUp .35s ease both;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">📋</div>
    <div class="title">paste-to-docs</div>
    <div class="status" id="status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Active</span>
    </div>
  </div>

  <div class="toggle-row">
    <span class="toggle-label">Auto-format on paste</span>
    <label class="toggle" aria-label="Toggle formatting">
      <input type="checkbox" id="toggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="section">
    <div class="section-label">Detected Sources</div>
    <div class="sources">
      <div class="source-chip"><span class="dot"></span>Claude</div>
      <div class="source-chip"><span class="dot"></span>ChatGPT</div>
      <div class="source-chip"><span class="dot"></span>Gemini</div>
      <div class="source-chip"><span class="dot"></span>Markdown</div>
    </div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-value animated" id="countVal">0</div>
      <div class="stat-label">Pastes formatted</div>
    </div>
    <div class="stat">
      <div class="stat-value animated" id="lastSourceVal" style="font-size:14px;padding-top:4px">—</div>
      <div class="stat-label">Last source</div>
    </div>
  </div>

  <div class="footer">
    <span class="version" id="version">v0.1.0</span>
    <a class="gh-link" href="https://github.com/pbot-9000-max/Paste-to-Docs" target="_blank" id="ghLink">
      ⭐ GitHub
    </a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
